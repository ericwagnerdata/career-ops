<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: #000;
    background: #fff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
  }

  a {
    color: #000;
    text-decoration: none;
    white-space: nowrap;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
    line-height: 1.1;
  }

  .contact-row {
    font-size: 10.5px;
    color: #000;
    text-align: center;
    line-height: 1.5;
  }

  .contact-row .separator {
    margin: 0 4px;
    color: #555;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 13px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: #000;
    border-bottom: 1.5px solid #000;
    padding-bottom: 2px;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  /* === PROFESSIONAL SUMMARY === */
  .summary-text {
    font-size: 11px;
    line-height: 1.65;
    color: #000;
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 11px;
  }

  .job-company {
    font-size: 11px;
    font-weight: 700;
    color: #000;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-top: 1px;
    margin-bottom: 2px;
  }

  .job-role {
    font-size: 11px;
    font-style: italic;
    color: #000;
    font-weight: 400;
  }

  .job-period {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    font-style: italic;
  }

  .job-location {
    font-size: 10px;
    color: #555;
  }

  .job ul {
    padding-left: 20px;
    margin-top: 4px;
  }

  .job li {
    font-size: 11px;
    line-height: 1.55;
    color: #000;
    margin-bottom: 3px;
  }

  .job li strong {
    font-weight: 600;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 5px;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-title {
    font-weight: 700;
    font-size: 11px;
    color: #000;
  }

  .edu-org {
    font-weight: 400;
    color: #000;
  }

  .edu-year {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
  }

  .edu-desc {
    font-size: 10.5px;
    color: #333;
    margin-top: 2px;
    line-height: 1.5;
  }

  /* === SKILLS === */
  .skills-text {
    font-size: 11px;
    color: #000;
    line-height: 1.6;
  }

  /* === INTERESTS === */
  .interests-text {
    font-size: 11px;
    color: #000;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      padding: 0;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <div class="skills-text">{{SKILLS}}</div>
  </div>

  <!-- INTERESTS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_INTERESTS}}</div>
    <div class="interests-text">{{INTERESTS}}</div>
  </div>

</div>
</body>
</html>
